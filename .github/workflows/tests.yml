name: Tests

on:
  pull_request:
    paths-ignore:
      - "web/**"
  push:
    branches: [main]
    paths-ignore:
      - "web/**"

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Run tests
        run: uv run --group dev pytest test/ -v
