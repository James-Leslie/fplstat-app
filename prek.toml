default_language_version.python = "3.13"

[[repos]]
repo = "builtin"
hooks = [
  { id = "check-added-large-files" },
  { id = "check-yaml" },
  { id = "check-toml" },
  { id = "check-json", exclude = "^\\.vscode/" },
  { id = "detect-private-key" },
  { id = "end-of-file-fixer" },
  { id = "trailing-whitespace" },
]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.6"
hooks = [
  { id = "ruff-check", args = ["--fix"] },
  { id = "ruff-format" },
]

[[repos]]
repo = "https://github.com/hukkin/mdformat"
rev = "1.0.0"

[[repos.hooks]]
id = "mdformat"
# Markdown inside web/ is owned by Prettier (configured in web/.prettierrc) so
# the two formatters don't fight over table column widths and list markers.
exclude = "^web/"
additional_dependencies = [
  "mdformat-pyproject",
  "mdformat-config",
  "mdformat-ruff",
  "mdformat-frontmatter",
  "mdformat-admon",
]

# Lint and format-check the SvelteKit app via its own pnpm scripts so package.json
# stays the single source of truth for JS tooling versions. Runs only when files
# under web/ are staged. Requires `mise install` to put pnpm on PATH.
[[repos]]
repo = "local"
hooks = [
  { id = "web-prettier", name = "prettier (web)", entry = "pnpm --dir web exec prettier --check .", language = "system", pass_filenames = false, files = "^web/" },
  { id = "web-eslint", name = "eslint (web)", entry = "pnpm --dir web exec eslint .", language = "system", pass_filenames = false, files = "^web/" },
  { id = "web-svelte-check", name = "svelte-check (web)", entry = "pnpm --dir web run check", language = "system", pass_filenames = false, files = "^web/" },
]
